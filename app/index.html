    <!-- Restore the real URL after the 404.html redirect trick runs (GitHub Pages SPA fix) -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <title>Qubeterra Institute | Building Capabilities. Engineering Civilization.</title>
    <meta name="description" content="Qubeterra Institute is a premier Deep Tech Think Tank and Capacity Building Hub focused on the Global South and Africa." />
